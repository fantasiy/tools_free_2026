<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Martir Offline — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #080a0f;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .glass-card {
      background: rgba(13, 16, 23, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(94, 160, 255, 0.2);
      border-radius: 32px;
      padding: 32px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(94,160,255,0.1);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #1a2440, #0f1928);
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      border: 1px solid rgba(94,160,255,0.3);
    }
    .logo-icon svg {
      width: 28px;
      height: 28px;
      color: #5ea0ff;
    }
    .logo h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #eef2ff;
    }
    .logo p {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: #5c6782;
      margin-top: 4px;
    }

    .toggle-buttons {
      display: flex;
      gap: 12px;
      background: #0d1017;
      padding: 6px;
      border-radius: 60px;
      margin-bottom: 28px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .toggle-btn {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-weight: 700;
      font-size: 14px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      color: #5c6782;
    }
    .toggle-btn.active {
      background: #1a3a6e;
      color: #5ea0ff;
      box-shadow: 0 2px 8px rgba(94,160,255,0.2);
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-group label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #3a4256;
      font-family: 'DM Mono', monospace;
    }
    .input-group input {
      background: #0d1017;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 16px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      color: #eef2ff;
      transition: 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #5ea0ff;
      box-shadow: 0 0 0 2px rgba(94,160,255,0.2);
    }
    .input-group input::placeholder {
      color: #2a3142;
    }

    .btn {
      background: linear-gradient(135deg, #1a3a6e, #0f2247);
      border: 1px solid rgba(94,160,255,0.4);
      border-radius: 16px;
      padding: 14px;
      font-weight: 800;
      font-size: 15px;
      color: #5ea0ff;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 8px;
    }
    .btn:active {
      transform: scale(0.97);
    }

    .message {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      text-align: center;
      margin-top: 16px;
      padding: 8px;
      border-radius: 12px;
      background: rgba(255,95,109,0.1);
      color: #ff5f6d;
      display: none;
    }
    .message.success {
      background: rgba(57,233,123,0.1);
      color: #39e97b;
    }

    .footer {
      text-align: center;
      font-size: 10px;
      color: #3a4256;
      margin-top: 24px;
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>
<div class="glass-card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>Martir Offline</h1>
    <p>secure access · offline first</p>
  </div>

  <div class="toggle-buttons">
    <div class="toggle-btn active" id="loginTab">LOGIN</div>
    <div class="toggle-btn" id="registerTab">REGISTER</div>
  </div>

  <!-- FORM LOGIN -->
  <div id="loginForm" class="form">
    <div class="input-group">
      <label>EMAIL (GMAIL)</label>
      <input type="email" id="loginEmail" placeholder="contoh@gmail.com" autocomplete="email">
    </div>
    <div class="input-group">
      <label>PASSWORD</label>
      <input type="password" id="loginPassword" placeholder="••••••">
    </div>
    <button class="btn" id="doLogin">→ MASUK</button>
  </div>

  <!-- FORM REGISTER (hidden awal) -->
  <div id="registerForm" class="form" style="display: none;">
    <div class="input-group">
      <label>EMAIL (GMAIL)</label>
      <input type="email" id="regEmail" placeholder="contoh@gmail.com">
    </div>
    <div class="input-group">
      <label>PASSWORD</label>
      <input type="password" id="regPassword" placeholder="minimal 6 karakter">
    </div>
    <div class="input-group">
      <label>KONFIRMASI PASSWORD</label>
      <input type="password" id="regConfirm" placeholder="ulangi password">
    </div>
    <button class="btn" id="doRegister">→ DAFTAR</button>
  </div>

  <div id="messageBox" class="message"></div>
  <div class="footer">1 Gmail = 1 akun | data tersimpan di browser</div>
</div>

<script>
  // === STORAGE KEYS ===
  const STORAGE_USERS = 'app_users';
  const STORAGE_CURRENT = 'app_current_user';

  // === INITIALISASI USER DEFAULT (optional) ===
  function initDefaultUsers() {
    let users = localStorage.getItem(STORAGE_USERS);
    if (!users) {
      // tidak ada user default, biarkan kosong
      localStorage.setItem(STORAGE_USERS, JSON.stringify([]));
    }
  }
  initDefaultUsers();

  // Helper: ambil array user
  function getUsers() {
    return JSON.parse(localStorage.getItem(STORAGE_USERS) || '[]');
  }

  function saveUsers(users) {
    localStorage.setItem(STORAGE_USERS, JSON.stringify(users));
  }

  // Hash sederhana (base64) agar tidak plaintext
  function hashPassword(pw) {
    return btoa(pw + 'martir_salt'); // salt sederhana
  }

  // Validasi email harus @gmail.com
  function isValidGmail(email) {
    return /^[a-zA-Z0-9._%+-]+@gmail\.com$/.test(email);
  }

  // Tampilkan pesan
  function showMessage(msg, isError = true) {
    const box = document.getElementById('messageBox');
    box.textContent = msg;
    box.className = 'message ' + (isError ? 'error' : 'success');
    box.style.display = 'block';
    setTimeout(() => { box.style.display = 'none'; }, 3000);
  }

  // === LOGIC TOGGLE LOGIN / REGISTER ===
  const loginTab = document.getElementById('loginTab');
  const registerTab = document.getElementById('registerTab');
  const loginFormDiv = document.getElementById('loginForm');
  const registerFormDiv = document.getElementById('registerForm');

  function setActiveTab(tab) {
    if (tab === 'login') {
      loginTab.classList.add('active');
      registerTab.classList.remove('active');
      loginFormDiv.style.display = 'flex';
      registerFormDiv.style.display = 'none';
    } else {
      registerTab.classList.add('active');
      loginTab.classList.remove('active');
      registerFormDiv.style.display = 'flex';
      loginFormDiv.style.display = 'none';
    }
  }

  loginTab.addEventListener('click', () => setActiveTab('login'));
  registerTab.addEventListener('click', () => setActiveTab('register'));

  // === REGISTER ===
  document.getElementById('doRegister').addEventListener('click', () => {
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirm = document.getElementById('regConfirm').value;

    if (!email || !password || !confirm) {
      showMessage('Semua field harus diisi');
      return;
    }
    if (!isValidGmail(email)) {
      showMessage('Harus menggunakan email @gmail.com');
      return;
    }
    if (password.length < 6) {
      showMessage('Password minimal 6 karakter');
      return;
    }
    if (password !== confirm) {
      showMessage('Password dan konfirmasi tidak cocok');
      return;
    }

    const users = getUsers();
    const exists = users.some(u => u.email === email);
    if (exists) {
      showMessage('Email sudah terdaftar, gunakan email lain');
      return;
    }

    const hashed = hashPassword(password);
    users.push({ email, password: hashed });
    saveUsers(users);
    showMessage('Registrasi berhasil! Silakan login.', false);
    // reset form register
    document.getElementById('regEmail').value = '';
    document.getElementById('regPassword').value = '';
    document.getElementById('regConfirm').value = '';
    // pindah ke tab login
    setActiveTab('login');
  });

  // === LOGIN ===
  document.getElementById('doLogin').addEventListener('click', () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      showMessage('Email dan password wajib diisi');
      return;
    }
    if (!isValidGmail(email)) {
      showMessage('Format email harus @gmail.com');
      return;
    }

    const users = getUsers();
    const hashedInput = hashPassword(password);
    const user = users.find(u => u.email === email && u.password === hashedInput);

    if (!user) {
      showMessage('Email atau password salah');
      return;
    }

    // simpan session
    localStorage.setItem(STORAGE_CURRENT, email);
    showMessage('Login sukses, mengarahkan...', false);
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 800);
  });

  // jika sudah login, jangan biarkan akses login lagi (optional)
  if (localStorage.getItem(STORAGE_CURRENT)) {
    // redirect ke dashboard jika sudah login
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
